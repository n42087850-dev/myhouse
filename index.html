<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYHOUSE PRO</title>
    <style>
        :root { --primary: #38bdf8; --gold: #fbbf24; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --subtext: #94a3b8; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; background: var(--card); padding: 5px; border-radius: 15px; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 10px; font-size: 11px; font-weight: 800; transition: 0.3s; color: var(--subtext); }
        .tab.active { background: var(--primary); color: #0f172a; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 12px; border-left: 4px solid var(--primary); }
        label { display: block; font-size: 11px; color: var(--subtext); margin-bottom: 4px; }
        input, select { background: #0f172a; color: white; border: 1px solid #334155; padding: 10px; border-radius: 8px; font-size: 14px; width: 100%; margin-bottom: 10px; outline: none; }
        .params-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .main-btn { width: 100%; background: var(--primary); color: #0f172a; padding: 20px; border: none; border-radius: 15px; font-weight: 800; font-size: 15px; cursor: pointer; margin-top: 10px; }
        .res-card { background: #020617; border: 1px solid var(--primary); padding: 20px; border-radius: 15px; margin-top: 15px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align: center; margin-bottom: 20px;">
        <h1 style="color: var(--primary); margin:0;">MYHOUSE</h1>
        <div style="font-size: 10px; color: var(--subtext); font-weight: 800;">SMART RENOVATION CALCULATOR</div>
    </header>

    <div id="rooms-container"></div>
    <button onclick="addRoom()" style="width:100%; background:transparent; border:1px dashed var(--subtext); color:var(--subtext); padding:15px; border-radius:12px; cursor:pointer;">+ Xona qo'shish</button>
    <button class="main-btn" onclick="calculateMaterials()">HISOBOTNI OLISH</button>
    <div id="res-materials"></div>
</div>

<script>
    function addRoom() {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <label>Xona turi</label>
            <select class="r-type">
                <option value="living_room">Mehmonxona</option>
                <option value="bedroom">Yotoqxona</option>
                <option value="kitchen">Oshxona</option>
                <option value="bathroom">Vanna</option>
                <option value="toilet">Hojatxona</option>
                <option value="corridor">Koridor</option>
            </select>
            <label>Dizayn uslubi</label>
            <select class="r-style">
                <option value="minimal">Minimalism</option>
                <option value="japandi">Japandi</option>
                <option value="loft">Loft</option>
                <option value="neoclassic">NeoClassic</option>
                <option value="ethnic_modern">Ethnic Modern</option>
            </select>
            <div class="params-grid">
                <div><label>Eni</label><input class="r-w" type="number" value="4"></div>
                <div><label>Uzunligi</label><input class="r-l" type="number" value="5"></div>
                <div><label>Balandligi</label><input class="r-h" type="number" value="3"></div>
            </div>
            <label>Oyna/Eshik (m2)</label><input class="r-o" type="number" value="2">
        `;
        document.getElementById('rooms-container').appendChild(div);
    }

    async function calculateMaterials() {
        const resDiv = document.getElementById('res-materials');
        resDiv.innerHTML = "<div class='res-card'>Hisoblanmoqda...</div>";
        
        const rooms = [];
        document.querySelectorAll('.card').forEach(b => {
            rooms.push({
                type: b.querySelector('.r-type').value,
                style: b.querySelector('.r-style').value,
                width: parseFloat(b.querySelector('.r-w').value),
                length: parseFloat(b.querySelector('.r-l').value),
                height: parseFloat(b.querySelector('.r-h').value),
                openings_area: parseFloat(b.querySelector('.r-o').value)
            });
        });

        try {
            // МЕНЯЕМ ЗДЕСЬ СТРУКТУРУ ПОД НОВЫЙ БЭКЕНД
            const response = await fetch('https://myhouse-mc1v.onrender.com/calculate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ rooms: rooms }) // Больше нет общего style в корне!
            });
            const data = await response.json();
            
            let html = `<div class="res-card"><h3>Materiallar ro'yxati:</h3>`;
            data.details.forEach(room => {
                html += `<p><b style="color:var(--gold)">${room.room_type}:</b><br>`;
                room.materials.forEach(m => {
                    let qty = m.quantity;
                    let unit = m.unit;
                    if (m.name.toLowerCase().includes("sement")) {
                        qty = Math.ceil(qty / 50);
                        unit = "qop";
                    }
                    html += `• ${m.name}: ${qty} ${unit}<br>`;
                });
                html += `</p>`;
            });
            html += `</div>`;
            resDiv.innerHTML = html;
        } catch (e) {
            resDiv.innerHTML = "<div class='res-card' style='color:red'>Server hali uyg'onmadi. 30 soniya kutib qayta urinib ko'ring.</div>";
        }
    }
    addRoom();
</script>
</body>
</html>
