<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYHOUSE </title>
    <style>
        :root { --primary: #38bdf8; --gold: #fbbf24; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --subtext: #94a3b8; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; background: var(--card); padding: 6px; border-radius: 16px; }
        .tab { flex: 1; padding: 12px 5px; text-align: center; cursor: pointer; border-radius: 12px; font-size: 11px; font-weight: 800; color: var(--subtext); border: none; background: none; }
        .tab.active { background: var(--primary); color: #0f172a; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: var(--card); padding: 18px; border-radius: 20px; margin-bottom: 15px; border-left: 5px solid var(--primary); }
        .params-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        input, select { background: #0f172a; color: white; border: 1px solid #334155; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 10px; }
        .add-btn { width: 100%; background: transparent; border: 2px dashed #334155; color: var(--subtext); padding: 15px; border-radius: 15px; margin-bottom: 10px; cursor: pointer; }
        .main-btn { width: 100%; background: var(--primary); color: #0f172a; padding: 20px; border: none; border-radius: 18px; font-weight: 900; cursor: pointer; }
        .total-price { font-size: 28px; color: var(--gold); text-align: center; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align: center; margin-bottom: 20px;">
        <h1 style="color: var(--primary); margin: 0;">MYHOUSE</h1>
        <p style="font-size: 10px; color: var(--subtext);">SMART SYSTEM</p>
    </header>

    <div class="tabs">
        <button class="tab active" onclick="switchTab(0)">1. MATERIALLAR</button>
        <button class="tab" onclick="switchTab(1)">2. USTA MEHNATI</button>
    </div>

    <div id="tab0" class="tab-content active">
        <div id="rooms-container"></div> <button class="add-btn" onclick="addRoom()">+ YANGI XONA QO'SHISH</button>
        <button class="main-btn" onclick="calculateAll()">HISOB-KITOBLARNI KO'RISH</button>
        <div id="res-materials" style="margin-top: 20px;"></div>
    </div>

    <div id="tab1" class="tab-content">
        <div id="res-work"></div>
    </div>
</div>

<script>
    let roomCount = 0;
    const STYLE_DATA = {
        minimal: [{n: "Och laminat", p: 35000, u: "f"}, {n: "Oq kraska", p: 20000, u: "w"}],
        japandi: [{n: "Och yog'och", p: 45000, u: "f"}, {n: "Matovaya emulsiya", p: 25000, u: "w"}],
        loft: [{n: "Beton / To'q laminat", p: 40000, u: "f"}, {n: "G'isht dekor", p: 35000, u: "w"}],
        neoclassic: [{n: "Parket", p: 65000, u: "f"}, {n: "Oboy + molding", p: 30000, u: "w"}],
        ethnic_modern: [{n: "Tabiiy yog'och", p: 55000, u: "f"}, {n: "Teksturali shtukaturka", p: 40000, u: "w"}]
    };
    const BASE_WORKS = [
        {n: "Styajka", p: 45000, u: "f"}, {n: "Shtukaturka", p: 50000, u: "w"},
        {n: "Potolok", p: 45000, u: "f"}, {n: "Engineering", p: 110000, u: "f"}
    ];

    function switchTab(idx) {
        document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
        document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('active', i === idx));
    }

    function addRoom() {
        roomCount++;
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <b>${roomCount}-XONA</b>
                <span style="color:red; cursor:pointer;" onclick="this.parentElement.parentElement.remove()">✕</span>
            </div>
            <select class="r-style">
                <option value="minimal">Minimalism</option>
                <option value="japandi">Japandi</option>
                <option value="loft">Loft</option>
                <option value="neoclassic">NeoClassic</option>
                <option value="ethnic_modern">Ethnic Modern</option>
            </select>
            <div class="params-grid">
                <input class="r-w" type="number" value="4" placeholder="Eni">
                <input class="r-l" type="number" value="5" placeholder="Uzunligi">
                <input class="r-h" type="number" value="3" placeholder="Balandligi">
            </div>
            <input class="r-o" type="number" value="2" placeholder="Oyna/Eshik">
        `;
        document.getElementById('rooms-container').appendChild(div);
    }

    async function calculateAll() {
        const matDiv = document.getElementById('res-materials');
        const workDiv = document.getElementById('res-work');
        matDiv.innerHTML = "<p style='text-align:center;'>Hisoblanmoqda...</p>";

        const rooms = [];
        document.querySelectorAll('.card').forEach(c => {
            const style = c.querySelector('.r-style').value;
            rooms.push({
                w: parseFloat(c.querySelector('.r-w').value) || 0,
                l: parseFloat(c.querySelector('.r-l').value) || 0,
                h: parseFloat(c.querySelector('.r-h').value) || 0,
                o: parseFloat(c.querySelector('.r-o').value) || 0,
                works: [...BASE_WORKS, ...STYLE_DATA[style]]
            });
        });

        try {
            const response = await fetch('https://myhouse-mc1v.onrender.com/calculate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(rooms)
            });
            const data = await response.json();
            workDiv.innerHTML = `
                <div class="card" style="text-align:center;">
                    <h2 style="color:var(--gold);">ISH HAQI SMETASI</h2>
                    <div class="total-price">${data.total_cost} UZS</div>
                    <button class="add-btn" onclick="switchTab(0)">YANA HISOBLASH</button>
                </div>`;
            switchTab(1);
            matDiv.innerHTML = "";
        } catch (e) {
            matDiv.innerHTML = "<p style='color:red;'>Xato! Serverga ulanib bo'lmadi.</p>";
        }
    }

    window.addEventListener('DOMContentLoaded', () => { addRoom(); });
</script>
</body>
</html>
