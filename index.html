<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYHOUSE V2</title>
    <style>
        :root {
            --primary: #38bdf8;
            --gold: #fbbf24;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --danger: #ef4444;
            --subtext: #94a3b8;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 450px; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: var(--primary); font-size: 28px; font-weight: 800; margin: 0; letter-spacing: 2px; }
        
        .room-card {
            background: var(--card); padding: 20px; border-radius: 15px;
            margin-bottom: 15px; border-left: 5px solid var(--primary); position: relative;
        }
        .remove-room { position: absolute; top: 10px; right: 10px; color: var(--danger); cursor: pointer; font-size: 20px; }
        
        label { display: block; font-size: 11px; color: var(--subtext); margin-bottom: 4px; margin-left: 5px; }
        
        input, select {
            background: #0f172a; color: white; border: 1px solid #334155;
            padding: 12px; border-radius: 10px; font-size: 14px; margin-bottom: 12px; width: 100%; outline: none;
        }
        input:focus { border-color: var(--primary); }

        .params-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        
        .add-btn {
            width: 100%; background: transparent; border: 2px dashed #334155;
            color: var(--subtext); padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; margin-bottom: 20px;
        }
        .main-btn {
            width: 100%; background: var(--primary); color: #0f172a;
            padding: 20px; border: none; border-radius: 15px; font-weight: 800; font-size: 16px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 4px 14px 0 rgba(56, 189, 248, 0.3);
        }

        .work-cost-link {
            color: var(--gold); text-decoration: underline; cursor: pointer; font-weight: bold;
        }

        /* MODAL */
        .modal {
            display: none; position: fixed; z-index: 100; left: 0; top: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: var(--card); padding: 25px; border-radius: 20px; 
            width: 100%; max-width: 400px; border: 1px solid var(--primary);
        }
        .close-modal { float: right; font-size: 24px; cursor: pointer; color: var(--danger); }

        .res-card { background: #020617; border: 1px solid var(--primary); padding: 20px; border-radius: 15px; margin-top: 20px; }
        .gallery-item { margin-top: 20px; background: #1e293b; padding: 10px; border-radius: 15px; border-bottom: 3px solid var(--primary); }
        .gallery-item img { width: 100%; border-radius: 10px; margin-top: 8px; }
        
        .disclaimer { 
            color: #64748b; font-size: 11px; text-align: center; margin-top: 25px; padding: 15px; 
            border-left: 2px solid var(--gold); background: rgba(30, 41, 59, 0.5); font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>MYHOUSE</h1>
        <p style="color: var(--subtext); font-size: 11px; margin-top: 5px; letter-spacing: 1px;">SMART RENOVATION SYSTEM</p>
    </div>

    <div id="rooms-container"></div>
    
    <button class="add-btn" onclick="addRoom()">+ Xona qo'shish (Добавить комнату)</button>

    <div style="text-align: center; margin-bottom: 15px;">
        <span class="work-cost-link" style="font-size: 13px;" onclick="openPriceList()">
            Xizmatlar narxi (Посмотреть расценки)
        </span>
    </div>

    <button class="main-btn" onclick="calculateAll()">HISOBLASH (РАССЧИТАТЬ)</button>

    <div id="res"></div>
    <div id="gallery"></div>

    <div class="disclaimer">
        * Dastur prototip bosqichida. Materiallar hisobida 10% zaxira mavjud. Ish haqi tafsilotlarini ko'rish uchun summaning ustiga bosing.
    </div>
</div>

<div id="workModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">×</span>
        <h3 id="modal-title" style="color: var(--primary); margin-top: 0;">Ma'lumot</h3>
        <div id="modal-body" style="font-size: 13px; color: var(--text);"></div>
    </div>
</div>

<script>
    let roomCount = 0;
    let lastResponse = null;

    function addRoom() {
        roomCount++;
        const container = document.getElementById('rooms-container');
        const div = document.createElement('div');
        div.className = 'room-card';
        div.id = `room-${roomCount}`;
        div.innerHTML = `
            <span class="remove-room" onclick="document.getElementById('room-${roomCount}').remove()">×</span>
            
            <label>Xona turi va uslubi (Тип и стиль)</label>
            <div style="display: flex; gap: 8px;">
                <select class="r-type" style="flex: 1.2;">
                    <option value="living_room">Mehmonxona (Гостиная)</option>
                    <option value="bedroom">Yotoqxona (Спальня)</option>
                    <option value="kitchen">Oshxona (Кухня)</option>
                    <option value="bathroom">Yuvinish xonasi (Ванная)</option>
                    <option value="toilet">Hojatxona (Туалет)</option>
                </select>
                <select class="r-style" style="flex: 1;">
                    <option value="minimal">Minimalism</option>
                    <option value="japandi">Japandi</option>
                    <option value="loft">Loft</option>
                    <option value="neoclassic">Neoclassic</option>
                    <option value="ethnic_modern">Ethnic</option>
                </select>
            </div>

            <div class="params-grid">
                <div>
                    <label>Eni (Ширина), м</label>
                    <input class="r-w" type="number" placeholder="0.0">
                </div>
                <div>
                    <label>Uzuni (Длина), м</label>
                    <input class="r-l" type="number" placeholder="0.0">
                </div>
                <div>
                    <label>Balandligi (Высота), м</label>
                    <input class="r-h" type="number" placeholder="0.0">
                </div>
            </div>

            <label>Eshik va derazalar (Окна/Двери), м²</label>
            <input class="r-o" type="number" placeholder="Masalan: 4.5">
        `;
        container.appendChild(div);
    }

    function openPriceList() {
        document.getElementById('modal-title').innerText = "Xizmatlar narxi (Прайс-лист)";
        document.getElementById('modal-body').innerHTML = `
            <ul style="padding-left: 15px; line-height: 1.8;">
                <li>Styajka: 45 000 UZS/m²</li>
                <li>Shtukaturka: 40 000 UZS/m²</li>
                <li>Shpatlevka: 25 000 UZS/m²</li>
                <li>Oboi: 20 000 UZS/m²</li>
                <li>Laminat: 35 000 UZS/m²</li>
                <li>Elektrika/Santexnika: 110 000 UZS/m²</li>
            </ul>`;
        document.getElementById('workModal').style.display = 'flex';
    }

    function openDetailModal() {
        if(!lastResponse) return;
        document.getElementById('modal-title').innerText = "Ishlar smetasi (Детализация)";
        let html = `<p style="color: var(--gold);">${lastResponse.summary.master_works_detail}</p><ul>`;
        lastResponse.summary.works_included.forEach(w => html += `<li>${w}</li>`);
        html += `</ul><p><b>Jami: ${lastResponse.summary.total_work_cost}</b></p>`;
        document.getElementById('modal-body').innerHTML = html;
        document.getElementById('workModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('workModal').style.display = 'none'; }

    async function calculateAll() {
        const rooms = [];
        const blocks = document.querySelectorAll('.room-card');
        
        blocks.forEach(block => {
            const w = parseFloat(block.querySelector('.r-w').value);
            const l = parseFloat(block.querySelector('.r-l').value);
            const h = parseFloat(block.querySelector('.r-h').value);
            if (w && l && h) {
                rooms.push({
                    type: block.querySelector('.r-type').value,
                    style: block.querySelector('.r-style').value,
                    width: w, length: l, height: h,
                    openings_area: parseFloat(block.querySelector('.r-o').value) || 0
                });
            }
        });

        if (rooms.length === 0) return alert("Ma'lumotlarni to'ldiring!");
        
        const resDiv = document.getElementById('res');
        resDiv.innerHTML = "<div style='text-align:center; color:var(--primary); padding:20px;'>Hisoblanmoqda...</div>";

        try {
            const response = await fetch('https://myhouse-mc1v.onrender.com/calculate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ rooms, style: rooms[0].style, master_rate: 100000 })
            });

            if (!response.ok) throw new Error();
            lastResponse = await response.json();
            
            let html = `<div class="res-card"><h3 style="color:var(--gold); margin-top:0;">HISOBOT:</h3>`;
            
            lastResponse.details.forEach(room => {
                html += `<div style="margin-bottom:10px;"><b style="color:var(--primary); font-size:12px;">${room.room_type.toUpperCase()}:</b>`;
                room.materials.forEach(m => {
                    html += `<div style="font-size:13px;">• ${m.n}: <b>${m.q} ${m.u}</b></div>`;
                });
                html += `</div>`;
            });

            html += `<hr style="border-color:#1e293b"><p>Ish haqi: <span class="work-cost-link" onclick="openDetailModal()">${lastResponse.summary.total_work_cost}</span></p></div>`;
            resDiv.innerHTML = html;

            document.getElementById('gallery').innerHTML = "";
            for (let r of rooms) {
                const imgResp = await fetch(`https://myhouse-mc1v.onrender.com/design/${r.type}/${r.style}`);
                const imgData = await imgResp.json();
                document.getElementById('gallery').innerHTML += `
                    <div class="gallery-item">
                        <p style="font-size:11px; color:var(--primary);">${r.type.toUpperCase()}</p>
                        <img src="https://myhouse-mc1v.onrender.com/${imgData.image}">
                    </div>`;
            }
        } catch (e) {
            resDiv.innerHTML = "<div class='res-card' style='border-color:var(--danger)'>Server uyg'onishini kuting (30 soniya).</div>";
        }
    }

    addRoom();
</script>
</body>
</html>
