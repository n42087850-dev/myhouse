<script>
    let roomCount = 0;

    // База данных стилей и работ (все 5 стилей тут)
    const STYLE_DATA = {
        minimal: [
            {n: "Och laminat", p: 35000, u: "f"},
            {n: "Oq kraska", p: 20000, u: "w"}
        ],
        japandi: [
            {n: "Och yog'och", p: 45000, u: "f"},
            {n: "Matovaya emulsiya", p: 25000, u: "w"}
        ],
        loft: [
            {n: "Beton / To'q laminat", p: 40000, u: "f"},
            {n: "G'isht dekor", p: 35000, u: "w"}
        ],
        neoclassic: [
            {n: "Parket", p: 65000, u: "f"},
            {n: "Oboy + molding", p: 30000, u: "w"}
        ],
        ethnic_modern: [
            {n: "Tabiiy yog'och", p: 55000, u: "f"},
            {n: "Teksturali shtukaturka", p: 40000, u: "w"}
        ]
    };

    // Базовые работы (обязательные для всех)
    const BASE_WORKS = [
        {n: "Styajka", p: 45000, u: "f"},
        {n: "Shtukaturka", p: 50000, u: "w"},
        {n: "Potolok", p: 45000, u: "f"},
        {n: "Engineering", p: 110000, u: "f"}
    ];

    function switchTab(idx) {
        document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
        document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('active', i === idx));
    }

    function addRoom() {
        roomCount++;
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <div class="card-title"><span>${roomCount}-XONA</span><span style="color:red; cursor:pointer;" onclick="this.parentElement.parentElement.remove()">✕</span></div>
            <label>Xona turi</label>
            <select class="r-type">
                <option value="living_room">Mehmonxona</option>
                <option value="bedroom">Yotoqxona</option>
                <option value="kitchen">Oshxona</option>
                <option value="bathroom">Vanna</option>
            </select>
            <label>Dizayn uslubi</label>
            <select class="r-style">
                <option value="minimal">Minimalism</option>
                <option value="japandi">Japandi</option>
                <option value="loft">Loft</option>
                <option value="neoclassic">NeoClassic</option>
                <option value="ethnic_modern">Ethnic Modern</option>
            </select>
            <div class="params-grid">
                <div><label>Eni</label><input class="r-w" type="number" value="4"></div>
                <div><label>Uzunligi</label><input class="r-l" type="number" value="5"></div>
                <div><label>Balandligi</label><input class="r-h" type="number" value="3"></div>
            </div>
            <label>Oyna/Eshik (m2)</label><input class="r-o" type="number" value="2">
        `;
        document.getElementById('rooms-container').appendChild(div);
    }

    async function calculateAll() {
        const matDiv = document.getElementById('res-materials');
        const workDiv = document.getElementById('res-work');
        matDiv.innerHTML = "Hisoblanmoqda...";

        const rooms = [];
        document.querySelectorAll('.card').forEach(c => {
            const style = c.querySelector('.r-style').value;
            // Собираем работы: Базовые + Работы по стилю
            const allWorks = [...BASE_WORKS, ...STYLE_DATA[style]];

            rooms.push({
                w: parseFloat(c.querySelector('.r-w').value) || 0,
                l: parseFloat(c.querySelector('.r-l').value) || 0,
                h: parseFloat(c.querySelector('.r-h').value) || 0,
                o: parseFloat(c.querySelector('.r-o').value) || 0,
                works: allWorks // ВОТ ОНИ!
            });
        });

        try {
            const response = await fetch('https://myhouse-mc1v.onrender.com/calculate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(rooms) // Отправляем чистый массив
            });

            const data = await response.json();
            
            // Вывод результата на "вторую страницу"
            workDiv.innerHTML = `
                <div class="res-card">
                    <h3 style="color:var(--gold); text-align:center;">ISH HAQI SMETASI</h3>
                    <div class="total-price">${data.total_cost} UZS</div>
                    <p style="text-align:center; font-size:12px; color:var(--subtext);">Hamma xonalar va tanlangan uslublar hisobga olindi.</p>
                </div>
            `;
            switchTab(1); // Переключаем на вторую вкладку сразу

        } catch (e) {
            matDiv.innerHTML = "Xato! Serverga ulanishda muammo.";
        }
    }
    // Ждем, пока весь HTML прогрузится, и только потом создаем первую комнату
window.addEventListener('DOMContentLoaded', () => {
    const container = document.getElementById('rooms-container');
    if (container) {
        addRoom();
    } else {
        console.error("ОШИБКА: Контейнер 'rooms-container' не найден в HTML!");
    }
});
</script>
