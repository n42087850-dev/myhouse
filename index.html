<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYHOUSE</title>
    <style>
        :root {
            --primary: #38bdf8;
            --gold: #fbbf24;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 450px; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: var(--primary); font-size: 28px; font-weight: 800; margin: 0; letter-spacing: 2px; }
        
        .room-card {
            background: var(--card); padding: 20px; border-radius: 15px;
            margin-bottom: 15px; border-left: 5px solid var(--primary); position: relative;
        }
        .remove-room { position: absolute; top: 10px; right: 10px; color: #ef4444; cursor: pointer; font-size: 20px; }
        
        input, select {
            background: #0f172a; color: white; border: 1px solid #334155;
            padding: 12px; border-radius: 10px; font-size: 14px; margin-bottom: 10px; width: 100%; outline: none;
        }
        .params-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

        .add-btn {
            width: 100%; background: transparent; border: 2px dashed #334155;
            color: #94a3b8; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; margin-bottom: 20px;
        }
        .main-btn {
            width: 100%; background: var(--primary); color: #0f172a;
            padding: 20px; border: none; border-radius: 15px; font-weight: 800; font-size: 16px; cursor: pointer; text-transform: uppercase;
        }

        .res-card { background: #020617; border: 1px solid var(--primary); padding: 20px; border-radius: 15px; margin-top: 20px; }
        .gallery-item { margin-top: 20px; background: #1e293b; padding: 10px; border-radius: 15px; }
        .gallery-item img { width: 100%; border-radius: 10px; }

        .disclaimer { 
            color: #64748b; font-size: 11px; text-align: center; margin-top: 25px; padding: 15px; 
            border-left: 2px solid var(--gold); background: rgba(30, 41, 59, 0.5); font-style: italic; line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>MYHOUSE</h1>
        <p style="color: #64748b; font-size: 12px; margin-top: 5px; letter-spacing: 1px;">ENGINEERING & DESIGN</p>
    </div>

    <div id="rooms-container"></div>
    <button class="add-btn" onclick="addRoom()">+ Xona qo'shish (Добавить комнату)</button>

    <div class="room-card" style="border-left-color: var(--gold);">
        <label style="font-size: 12px; color: #94a3b8; margin-bottom: 5px; display: block;">Usta stavkasi (м²):</label>
        <input id="rate" type="number" value="100000">
    </div>

    <button class="main-btn" onclick="calculateAll()">HISOBLASH</button>

    <div id="res"></div>
    <div id="gallery"></div>

    <div class="disclaimer">
        * Прототип системы. В расчет материалов автоматически заложен <b>запас 10%</b> на подрезку и производственный брак. Визуализации являются стилистическими референсами.
    </div>

    <footer style="margin-top: 40px; text-align: center; border-top: 1px solid #1e293b; padding-top: 20px; padding-bottom: 40px;">
        <p style="color: #94a3b8; font-size: 11px;">PROJECT ARCHITECT & DEVELOPER</p>
        <p style="color: #f8fafc; font-size: 16px; font-weight: 800; margin-top: 5px;"><span style="color: var(--primary);">NODIRJON</span> SOBIROV</p>
        <p style="color: #475569; font-size: 10px; margin-top: 15px; text-transform: uppercase;">© 2026 MyHouse Solution</p>
    </footer>
</div>

<script>
    let roomCount = 0;

    function addRoom() {
        roomCount++;
        const container = document.getElementById('rooms-container');
        const div = document.createElement('div');
        div.className = 'room-card';
        div.id = `room-${roomCount}`;
        div.innerHTML = `
            <span class="remove-room" onclick="document.getElementById('room-${roomCount}').remove()">×</span>
            <div style="display: flex; gap: 8px; margin-bottom: 5px;">
                <select class="r-type" style="flex: 1;">
                    <option value="living_room">Гостиная</option>
                    <option value="bedroom">Спальня</option>
                    <option value="kitchen">Кухня</option>
                    <option value="bathroom">Ванная</option>
                </select>
                <select class="r-style" style="flex: 1;">
                    <option value="minimal">Minimalism</option>
                    <option value="japandi">Japandi</option>
                    <option value="loft">Loft</option>
                    <option value="neoclassic">Neoclassic</option>
                    <option value="ethnic_modern">Ethnic</option>
                </select>
            </div>
            <div class="params-grid">
                <input class="r-w" type="number" placeholder="Eni (м)">
                <input class="r-l" type="number" placeholder="Bo'yi (м)">
                <input class="r-h" type="number" placeholder="Baland.">
            </div>
            <input class="r-o" type="number" placeholder="Eshik/Oyna m²" style="margin-top: 5px;">
        `;
        container.appendChild(div);
    }

    async function calculateAll() {
        const rooms = [];
        const blocks = document.querySelectorAll('.room-card:not([style*="gold"])');
        
        blocks.forEach(block => {
            let hValue = parseFloat(block.querySelector('.r-h').value) || 2.7;
            rooms.push({
                type: block.querySelector('.r-type').value,
                style: block.querySelector('.r-style').value,
                width: parseFloat(block.querySelector('.r-w').value) || 0,
                length: parseFloat(block.querySelector('.r-l').value) || 0,
                height: hValue,
                openings_area: parseFloat(block.querySelector('.r-o').value) || 0
            });
        });

        if (rooms.length === 0) return alert("Xona qo'shing!");
        const rate = parseFloat(document.getElementById('rate').value) || 0;
        const resDiv = document.getElementById('res');
        resDiv.innerHTML = "<div style='text-align:center;'>Hisoblanmoqda (Сервер просыпается)...</div>";

        try {
            const response = await fetch('https://myhouse-mc1v.onrender.com/calculate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ rooms, style: rooms[0].style, master_rate: rate })
            });

            if (!response.ok) throw new Error();
            const data = await response.json();
            
            let html = `<div class="res-card"><h3>HISOBOT (+10% zapas):</h3>`;
            // Добавляем 10% к количеству каждого материала
            data.details.forEach(room => {
                room.materials.forEach(m => {
                    let qtyWithReserve = (m.q * 1.1).toFixed(1);
                    html += `<div style="font-size:13px; margin-bottom:5px;">• ${m.n}: <b>${qtyWithReserve} ${m.u}</b></div>`;
                });
            });
            html += `<hr style="border-color:#1e293b"><p>Ish haqi: <b>${data.summary.total_work_cost}</b></p></div>`;
            resDiv.innerHTML = html;

            document.getElementById('gallery').innerHTML = "";
            for (let r of rooms) {
                const imgResp = await fetch(`https://myhouse-mc1v.onrender.com/design/${r.type}/${r.style}`);
                const imgData = await imgResp.json();
                document.getElementById('gallery').innerHTML += `
                    <div class="gallery-item">
                        <p style="font-size:12px; color:var(--primary); font-weight:bold;">${r.type.toUpperCase()} - ${r.style.toUpperCase()}</p>
                        <img src="https://myhouse-mc1v.onrender.com/${imgData.image}">
                    </div>`;
            }
        } catch (e) {
            resDiv.innerHTML = "<b style='color:#ef4444'>Сервер временно недоступен. Пожалуйста, подождите 30 секунд (идет запуск) и нажмите еще раз.</b>";
        }
    }
    addRoom();
</script>
</body>
</html>
