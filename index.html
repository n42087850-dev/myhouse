<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYHOUSE PRO</title>
    <style>
        :root { --primary: #38bdf8; --gold: #fbbf24; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --subtext: #94a3b8; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; }
        
        /* ТАБЫ */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; background: var(--card); padding: 5px; border-radius: 15px; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 10px; font-size: 11px; font-weight: 800; transition: 0.3s; color: var(--subtext); border: 1px solid transparent; }
        .tab.active { background: var(--primary); color: #0f172a; border-color: var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 12px; border-left: 4px solid var(--primary); }
        .work-group-title { color: var(--gold); font-size: 13px; font-weight: 800; margin-bottom: 10px; text-transform: uppercase; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        
        label { display: block; font-size: 11px; color: var(--subtext); margin-bottom: 4px; }
        input, select { background: #0f172a; color: white; border: 1px solid #334155; padding: 10px; border-radius: 8px; font-size: 14px; width: 100%; margin-bottom: 10px; outline: none; }
        
        .params-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        
        /* Список работ */
        .work-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .work-row input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--primary); cursor: pointer; }
        .work-row .work-info { flex: 1; display: flex; flex-direction: column; }
        .work-row .work-name { font-size: 12px; font-weight: 600; }
        .work-row .work-price-input { width: 90px; margin: 0; padding: 6px; font-size: 12px; text-align: right; }

        .main-btn { width: 100%; background: var(--primary); color: #0f172a; padding: 20px; border: none; border-radius: 15px; font-weight: 800; font-size: 15px; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2); }
        .res-card { background: #020617; border: 1px solid var(--primary); padding: 20px; border-radius: 15px; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align: center; margin-bottom: 20px;">
        <h1 style="color: var(--primary); margin:0; letter-spacing: 2px;">MYHOUSE</h1>
        <div style="font-size: 10px; color: var(--subtext); font-weight: 800;">SMART RENOVATION CALCULATOR</div>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="switchTab(0)">1. MATERIAL & DIZAYN</div>
        <div class="tab" onclick="switchTab(1)">2. USTA MEHNATI (m²)</div>
    </div>

    <div id="tab0" class="tab-content active">
        <div id="rooms-container"></div>
        <button onclick="addRoom()" style="width:100%; background:transparent; border:1px dashed var(--subtext); color:var(--subtext); padding:15px; border-radius:12px; cursor:pointer; font-weight: 600;">+ Xona qo'shish (Добавить комнату)</button>
        <button class="main-btn" onclick="calculateMaterials()">HISOBOTNI OLISH (РАСЧЕТ)</button>
        <div id="res-materials"></div>
    </div>

    <div id="tab1" class="tab-content">
        <div class="card" style="border-left-color: var(--gold);">
            <div id="works-container"></div>
        </div>
        <button class="main-btn" onclick="calculateWorkSum()" style="background: var(--gold);">ISH HAQINI HISOBLASH</button>
        <div id="res-work"></div>
    </div>
</div>

<script>
    let totalFloorArea = 0;
    let totalWallArea = 0;

    const worksData = [
        { cat: "Pol (Полы)", items: [
            { id: "styajka", name: "Styajka (Стяжка)", p: 45000 },
            { id: "nalivnoy", name: "Nalivnoy pol", p: 25000 },
            { id: "laminat", name: "Laminat/Tarket", p: 35000 },
            { id: "kafel_p", name: "Kafel (pol)", p: 60000 },
            { id: "plintus", name: "Plintus (m.p.)", p: 15000 }
        ]},
        { cat: "Devor (Стены)", items: [
            { id: "shtukaturka", name: "Shtukaturka", p: 40000 },
            { id: "shpatlevka", name: "Shpatlevka", p: 25000 },
            { id: "oboi", name: "Oboi yopishtirish", p: 25000 },
            { id: "pokraska", name: "Bo'yoq (Покраска)", p: 20000 },
            { id: "dekor", name: "Travertin/Dekor", p: 80000 }
        ]},
        { cat: "Potolok & Ingeneriya", items: [
            { id: "natyajnoy", name: "Natyajnoy potolok", p: 50000 },
            { id: "gips", name: "Gipsokarton", p: 60000 },
            { id: "elektro", name: "Elektromontaj (m²)", p: 110000 },
            { id: "santex", name: "Santexnika (m²)", p: 90000 }
        ]}
    ];

    function switchTab(idx) {
        document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
        document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('active', i === idx));
    }

    function addRoom() {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <label>Xona turi (Тип комнаты)</label>
            <select class="r-type">
                <option value="living_room">Mehmonxona (Гостиная)</option>
                <option value="bedroom">Yotoqxona (Спальня)</option>
                <option value="corridor">Koridor (Коридор)</option>
                <option value="kitchen">Oshxona (Кухня)</option>
                <option value="bathroom">Vanna/Hojatxona</option>
            </select>
            <select class="r-style">
    <option value="minimal">Minimalism</option>
    <option value="japandi">Japandi</option>
    <option value="loft">Loft</option>
    <option value="Neoclassic">NeoClassic (Неоклассика)</option>
    <option value="Ethnic modern">Ethnic Modern (Этно Модерн)</option>
</select>
            <div class="params-grid">
                <div><label>Eni (м)</label><input class="r-w" type="number" placeholder="0"></div>
                <div><label>Uzunligi (м)</label><input class="r-l" type="number" placeholder="0"></div>
                <div><label>Balandligi (м)</label><input class="r-h" type="number" placeholder="0"></div>
            </div>
            <label>Oyna va eshiklar (m²)</label><input class="r-o" type="number" placeholder="0">
        `;
        document.getElementById('rooms-container').appendChild(div);
    }

    function renderWorks() {
        const container = document.getElementById('works-container');
        worksData.forEach(group => {
            let html = `<div class="work-group-title">${group.cat}</div>`;
            group.items.forEach(work => {
                html += `
                <div class="work-row">
                    <input type="checkbox" class="w-check" data-id="${work.id}">
                    <div class="work-info">
                        <span class="work-name">${work.name}</span>
                    </div>
                    <input type="number" class="work-price-input" value="${work.p}">
                </div>`;
            });
            container.innerHTML += html;
        });
    }

    async function calculateMaterials() {
    const resDiv = document.getElementById('res-materials');
    resDiv.innerHTML = "<div class='res-card'>Hisoblanmoqda... (Идет расчет)</div>";
    
    const rooms = [];
    document.querySelectorAll('#tab0 .card').forEach(b => {
        const w = parseFloat(b.querySelector('.r-w').value) || 0;
        const l = parseFloat(b.querySelector('.r-l').value) || 0;
        const h = parseFloat(b.querySelector('.r-h').value) || 0;
        const o = parseFloat(b.querySelector('.r-o').value) || 0;
        
        if (w > 0 && l > 0) {
            rooms.push({
                type: b.querySelector('.r-type').value,
                width: w, length: l, height: h,
                openings_area: o
            });
        }
    });

    if (rooms.length === 0) return alert("Xona o'lchamlarini kiriting!");

    try {
        const response = await fetch('https://myhouse-mc1v.onrender.com/calculate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ rooms: rooms, style: "minimal" })
        });
        const data = await response.json();
        
        // 1. Считаем общие площади для второго таба
        totalFloorArea = data.details.reduce((sum, r) => sum + r.floor_area, 0);
        totalWallArea = data.details.reduce((sum, r) => sum + r.wall_area, 0);

        // 2. Выводим список материалов
        let html = `<div class="res-card">
                        <h3 style="color:var(--primary); margin-top:0;">Qurilish materiallari:</h3>`;
        data.details.forEach(room => {
            html += `<div style="margin-bottom:10px; border-bottom:1px solid #1e293b;">
                        <b style="color:var(--gold); text-transform:uppercase;">${room.room_type}</b><br>`;
            room.materials.forEach(m => {
                html += `<span style="font-size:13px;">• ${m.name}: <b>${m.quantity} ${m.unit}</b></span><br>`;
            });
            html += `</div>`;
        });
        html += `</div>`;
        
        // 3. Выводим дизайн (берём первую комнату для примера)
        const firstRoom = rooms[0];
        html += `<div class="res-card">
                    <h3 style="color:var(--primary);">Dizayn (Visualizatsiya):</h3>
                    <img src="https://myhouse-mc1v.onrender.com/design/${firstRoom.type}/minimal" 
                         style="width:100%; border-radius:10px; border:1px solid var(--primary);"
                         onerror="this.src='https://via.placeholder.com/400x250?text=Dizayn+yuklanmadi'">
                 </div>`;
        
        resDiv.innerHTML = html;
        alert("Hisoblandi! Endi 'USTA MEHNATI' bo'limiga o'ting.");

    } catch (e) {
        resDiv.innerHTML = "<div class='res-card' style='border-color:red;'>Server bilan aloqa yo'q. Internetni yoki Render statusini tekshiring.</div>";
    }
}
    function calculateWorkSum() {
        if (totalFloorArea === 0) return alert("Avval 1-bo'limda xonalarni hisoblang!");
        let totalSum = 0;
        const checks = document.querySelectorAll('.w-check');
        const prices = document.querySelectorAll('.work-price-input');
        
        checks.forEach((ch, i) => {
            if (ch.checked) {
                const id = ch.dataset.id;
                const price = parseFloat(prices[i].value) || 0;
                // Логика: если работа по полу - умножаем на пол, если по стенам - на стены
                if (["styajka", "nalivnoy", "laminat", "kafel_p", "plintus", "elektro", "santex"].includes(id)) {
                    totalSum += price * totalFloorArea;
                } else {
                    totalSum += price * totalWallArea;
                }
            }
        });

        document.getElementById('res-work').innerHTML = `
            <div class="res-card" style="border-color: var(--gold);">
                <h2 style="color: var(--gold); margin:0;">${totalSum.toLocaleString()} UZS</h2>
                <p style="font-size:12px; color: var(--subtext);">Jami usta mehnati uchun</p>
            </div>`;
    }

    addRoom();
    renderWorks();
</script>
</body>
</html>
